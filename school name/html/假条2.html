<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>假条2</title>
		<link rel="stylesheet" href="../css/假条2.css" />
		<img src="../img/微信图片_20260510034229_157_67.jpg"/ width="100%">
	</head>
	<body>
		<table class="zhengti">
			<div>
				<p class="biaoti">电子请假条</p>
				<label for="upImg">
					<img id="showImg" src="../img/微信图片_20260408215805_131_67.png" alt="" width="160px" style="margin-left: 30px; margin-bottom: 15px;cursor:pointer;" />
				</label>
				<input type="file" id="upImg" accept="image/*" style="display:none;">
			</div>
			<tr>
				<td class="rq"><b>审核状态：<span contenteditable>审核通过</span>，&nbsp;是否销假：<span contenteditable>未销假</span></b></td>
				<td></td>
			</tr>
			<tr>
				<td class="rq"><b>开始日期：<span contenteditable>2026-03-23 12:00</span></b></td>
			</tr>
			<tr>
				<td class="rq"><b>结束日期：<span contenteditable>2026-03-23  12:00</span></b></td>
			</tr>
			<tr>
				<td class="daxiao">姓名:&nbsp;&nbsp;<span contenteditable></span>，性别：&nbsp;<span contenteditable></span>&nbsp;&nbsp;电话：<span contenteditable></span></td>
			</tr>
			<tr>
				<td class="daxiao">班级：<span contenteditable></span></td>
			</tr>
			<tr>
				<td class="daxiao">辅导员：<span contenteditable></span>，辅导员电话：<span contenteditable></span></td>
			</tr>
			<tr>
				<td class="daxiao">寝室号：<span contenteditable></span>，学号：<span contenteditable></span></td>
			</tr>
			<tr>
				<td class="daxiao">目的地：<span contenteditable></span></td>
			</tr>
			<tr>
				<td class="daxiao">请假事由：<span contenteditable>不知道不知道</span></td>
			</tr>
			<tr>
				<td class="daxiao">是否出校：<span contenteditable></span>，审核时间：<span contenteditable>2026-05-14&nbsp;&nbsp;12:00</span></td>
			</tr>
			<tr>
				<td class="daxiao">实际销假时间：<span contenteditable></span></td>
			</tr>
			<tr>
				<td class="daxiao">审核未通过理由：<span contenteditable></span></td>
			</tr>
		</table>

<script>
// 选图片立刻替换显示
let upImg = document.getElementById('upImg');
let showImg = document.getElementById('showImg');
upImg.onchange = function(e){
    let file = e.target.files[0];
    if(!file) return;
    let reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = function(){
        showImg.src = reader.result;
    }
}
</script>

	</body>
</html>
